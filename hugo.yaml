baseURL: "https://gking.harvard.edu/"
title: "Gary King"
languageCode: en-us
copyright: "Gary King"
enableGitInfo: false
enableEmoji: true
hasCSSJSConfigInAssets: true

build:
  writeStats: true

# Skip files inside `_intake_figures/` directories. The intake bots
# render every numbered Figure N from a paper's PDF into one of these
# folders so reviewers can swap the featured image with `/figure N`,
# but they shouldn't ship as page resources on the published site.
# A separate workflow (cleanup-intake-figures.yml) removes them from
# `main` post-merge; this ignore is the belt-and-braces complement.
ignoreFiles:
  - "_intake_figures/.*"

module:
  imports:
    - path: github.com/HugoBlox/hugo-blox-builder/modules/blox-plugin-netlify
    - path: github.com/HugoBlox/hugo-blox-builder/modules/blox-tailwind
  # The repo is organised under a single top-level `EditMe/` folder
  # (one sub-folder per website-menu section) plus a few items pinned at
  # the repo root. The mounts block below remaps each EditMe/ folder onto
  # the targets Hugo expects (content/, layouts/, data/, ...).
  #
  # During the EditMe migration the `_automation/scripts/generate_mounts.py`
  # script falls back to the legacy section-driven paths from PR #10
  # (writings/, people/, ...) wherever EditMe/ is still empty, so the
  # build keeps working as content moves over.
  #
  # DO NOT EDIT THE BLOCK BETWEEN THE MARKERS BELOW BY HAND.
  # Run: `python3 _automation/scripts/generate_mounts.py` after adding or
  # removing folders under EditMe/. CI also runs this with --check on every
  # build to catch drift.
  mounts:
    # === BEGIN AUTO-GENERATED MOUNTS (run _automation/scripts/generate_mounts.py) ===
    - {source: layouts,                         target: layouts}       # shared theme bits (pinned at root)
    - {source: bio/layouts,                     target: layouts/bio}
    - {source: blog/layouts,                    target: layouts/blog}
    - {source: contact/layouts,                 target: layouts/contact}
    - {source: dataverse/layouts,               target: layouts/dataverse}
    - {source: home/layouts,                    target: layouts}
    - {source: people/layouts/people,           target: layouts/people}
    - {source: research-areas/layouts,          target: layouts/research-areas}
    - {source: people/layouts/research-group,   target: layouts/research-group}
    - {source: software/layouts,                target: layouts/software}
    - {source: talks/layouts,                   target: layouts/talk}
    - {source: teaching/layouts/teaching,       target: layouts/teaching}
    - {source: teaching/layouts/teaching-class, target: layouts/teaching-class}
    - {source: writings/layouts,                target: layouts/publication}
    - {source: home/content,                    target: content}
    - {source: bio/content,                     target: content/bio}
    - {source: pages/content,                   target: content}
    - {source: blog/content,                    target: content/blog}
    - {source: research-areas/content,          target: content/research-areas}
    - {source: software/content,                target: content/software}
    - {source: dataverse/content,               target: content/dataverse}
    - {source: people/content/group,            target: content/research-group}
    - {source: people/content/profiles,         target: content/people}
    - {source: people/content/authors,          target: content/authors}
    - {source: teaching/content,                target: content/teaching}
    - {source: contact/content,                 target: content/contact}
    - {source: redirects/content,               target: content/_redirects}
    - {source: writings/content,                target: content/publication}
    - {source: talks/content,                   target: content/talk}
    - {source: _site/data,                      target: data}          # cross-section data files
    - {source: writings/data,                   target: data}
    - {source: software/data,                   target: data}
    - {source: dataverse/data,                  target: data}
    - {source: people/data,                     target: data}
    - {source: research-areas/data,             target: data}
    - {source: redirects/data,                  target: data}
    - {source: assets,                          target: assets}        # pinned at root: HugoBlox theme uses fileExists
    - {source: _site/static,                    target: static}
    - {source: _site/archetypes,                target: archetypes}
    - {source: _site/i18n,                      target: i18n}
    # === END AUTO-GENERATED MOUNTS ===

markup:
  goldmark:
    renderer:
      unsafe: true
    extensions:
      linkify: true
  highlight:
    lineNos: false
  tableOfContents:
    endLevel: 3
    startLevel: 2

imaging:
  resampleFilter: CatmullRom
  quality: 75
  anchor: smart

outputs:
  home:
    - HTML
    - RSS
    - JSON

params:
  appearance:
    theme_day: custom
    theme_night: custom
    color_mode: light
    font: native
    font_size: L
  marketing:
    seo:
      site_type: Person
      local_business_type: ""
      org_name: "Gary King"
      description: "Gary King - Weatherhead University Professor at Harvard University"
  header:
    navbar:
      enable: true
      fixed: true
      highlight_active_link: true
      show_search: true
  footer:
    copyright:
      notice: "© {year} Gary King. All rights reserved."
  features:
    math:
      enable: false
    search:
      provider: flexsearch
  publications:
    citation_style: apa
  extensions:
    css:
      - css/custom.css

taxonomies:
  tag: tags
  category: categories
  publication_type: publication_types
  author: authors

menus:
  main:
    - name: Bio & C.V.
      url: /bio/
      weight: 10
    - name: Writings
      url: /publication/
      weight: 20
    - name: Research Areas
      url: /#research-areas
      weight: 30
    - name: Software
      url: /software/
      weight: 40
    - name: Dataverse
      url: /dataverse/
      weight: 50
    - name: People
      url: /research-group/
      weight: 60
    - name: Teaching
      url: /teaching/
      weight: 70
    - name: Contact
      url: /contact/
      weight: 80

permalinks:
  publication: /publication/:slug/
  talk: /talk/:slug/
  software: /software/:slug/
