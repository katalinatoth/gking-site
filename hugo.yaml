    - {source: EditMe/Writings/Patents/2010s,                                     target: content/publication}
    - {source: EditMe/Writings/Patents/2020s,                                     target: content/publication}
    - {source: EditMe/Writings/CourtBriefs/2000s,                                 target: content/publication}
