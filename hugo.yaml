    - {source: EditMe/Writings/Articles/Other/2000s,                              target: content/publication}
    - {source: EditMe/Writings/Articles/Other/2010s,                              target: content/publication}
    - {source: EditMe/Writings/Articles/Other/2020s,                              target: content/publication}
    - {source: EditMe/Writings/Articles/QualitativeResearch/1990s,                target: content/publication}
