baseURL: "https://gking.harvard.edu/"
title: "Gary King"
languageCode: en-us
copyright: "Gary King"
enableGitInfo: false
enableEmoji: true
hasCSSJSConfigInAssets: true

build:
  writeStats: true

# Skip files inside `_intake_figures/` directories. The intake bots
# render every numbered Figure N from a paper's PDF into one of these
# folders so reviewers can swap the featured image with `/figure N`,
# but they shouldn't ship as page resources on the published site.
# A separate workflow (cleanup-intake-figures.yml) removes them from
# `main` post-merge; this ignore is the belt-and-braces complement.
ignoreFiles:
  - "_intake_figures/.*"
  # Skip section README.md files. They're for human navigation in the
  # repo (visible on GitHub) and shouldn't render as pages on the site.
  - "(^|/)README\\.md$"

module:
  imports:
    - path: github.com/HugoBlox/hugo-blox-builder/modules/blox-plugin-netlify
    - path: github.com/HugoBlox/hugo-blox-builder/modules/blox-tailwind
  # The repo is organised under a single top-level `EditMe/` folder
  # (one sub-folder per website-menu section) plus a few items pinned at
  # the repo root. The mounts block below remaps each EditMe/ folder onto
  # the targets Hugo expects (content/, layouts/, data/, ...).
  #
  # During the EditMe migration the `_automation/scripts/generate_mounts.py`
  # script falls back to the legacy section-driven paths from PR #10
  # (writings/, people/, ...) wherever EditMe/ is still empty, so the
  # build keeps working as content moves over.
  #
  # DO NOT EDIT THE BLOCK BETWEEN THE MARKERS BELOW BY HAND.
  # Run: `python3 _automation/scripts/generate_mounts.py` after adding or
  # removing folders under EditMe/. CI also runs this with --check on every
  # build to catch drift.
  mounts:
    # === BEGIN AUTO-GENERATED MOUNTS (run _automation/scripts/generate_mounts.py) ===
    - {source: layouts,                                                           target: layouts} # shared theme bits (pinned at root)
    - {source: EditMe/UI/PerSectionLayouts/Bio,                                   target: layouts/bio}
    - {source: EditMe/UI/PerSectionLayouts/Blog,                                  target: layouts/blog}
    - {source: EditMe/UI/PerSectionLayouts/Contact,                               target: layouts/contact}
    - {source: EditMe/UI/PerSectionLayouts/Dataverse,                             target: layouts/dataverse}
    - {source: EditMe/UI/PerSectionLayouts/HomePage,                              target: layouts}
    - {source: EditMe/UI/PerSectionLayouts/People,                                target: layouts/people}
    - {source: EditMe/UI/PerSectionLayouts/ResearchAreas,                         target: layouts/research-areas}
    - {source: EditMe/UI/PerSectionLayouts/ResearchGroup,                         target: layouts/research-group}
    - {source: EditMe/UI/PerSectionLayouts/Software,                              target: layouts/software}
    - {source: EditMe/UI/PerSectionLayouts/Talks,                                 target: layouts/talk}
    - {source: EditMe/UI/PerSectionLayouts/Teaching,                              target: layouts/teaching}
    - {source: EditMe/UI/PerSectionLayouts/TeachingClass,                         target: layouts/teaching-class}
    - {source: EditMe/UI/PerSectionLayouts/Writings,                              target: layouts/publication}
    - {source: EditMe/HomePage,                                                   target: content}
    - {source: EditMe/Bio,                                                        target: content/bio}
    - {source: EditMe/Misc,                                                       target: content}
    - {source: EditMe/Blog,                                                       target: content/blog}
    - {source: EditMe/ResearchAreas,                                              target: content/research-areas}
    - {source: EditMe/Software,                                                   target: content/software}
    - {source: EditMe/Dataverse,                                                  target: content/dataverse}
    - {source: EditMe/People/ResearchGroup,                                       target: content/research-group}
    - {source: EditMe/People/Profiles,                                            target: content/people}
    - {source: EditMe/People/Authors,                                             target: content/authors}
    - {source: EditMe/Teaching,                                                   target: content/teaching}
    - {source: EditMe/Contact,                                                    target: content/contact}
    - {source: redirects/content,                                                 target: content/_redirects}
    - {source: EditMe/Writings/Articles/AnchoringVignettes/2000s,                 target: content/publication}
    - {source: EditMe/Writings/Articles/AnchoringVignettes/2010s,                 target: content/publication}
    - {source: EditMe/Writings/Articles/AutomatedTextAnalysis/2000s,              target: content/publication}
    - {source: EditMe/Writings/Articles/AutomatedTextAnalysis/2010s,              target: content/publication}
    - {source: EditMe/Writings/Articles/AutomatedTextAnalysis/2020s,              target: content/publication}
    - {source: EditMe/Writings/Articles/CausalInference/1990s,                    target: content/publication}
    - {source: EditMe/Writings/Articles/CausalInference/2000s,                    target: content/publication}
    - {source: EditMe/Writings/Articles/CausalInference/2010s,                    target: content/publication}
    - {source: EditMe/Writings/Articles/EcologicalInference/1990s,                target: content/publication}
    - {source: EditMe/Writings/Articles/EcologicalInference/2000s,                target: content/publication}
    - {source: EditMe/Writings/Articles/EcologicalInference/2010s,                target: content/publication}
    - {source: EditMe/Writings/Articles/EventCountsAndDurations/1980s,            target: content/publication}
