baseURL: "https://gking.harvard.edu/"
title: "Gary King"
languageCode: en-us
copyright: "Gary King"
enableGitInfo: false
enableEmoji: true
hasCSSJSConfigInAssets: true

build:
  writeStats: true

# Skip files inside `_intake_figures/` directories. The intake bots
# render every numbered Figure N from a paper's PDF into one of these
# folders so reviewers can swap the featured image with `/figure N`,
# but they shouldn't ship as page resources on the published site.
# A separate workflow (cleanup-intake-figures.yml) removes them from
# `main` post-merge; this ignore is the belt-and-braces complement.
ignoreFiles:
  - "_intake_figures/.*"
  # Skip section README.md files. They're for human navigation in the
  # repo (visible on GitHub) and shouldn't render as pages on the site.
  - "(^|/)README\\.md$"

module:
  imports:
    - path: github.com/HugoBlox/hugo-blox-builder/modules/blox-plugin-netlify
    - path: github.com/HugoBlox/hugo-blox-builder/modules/blox-tailwind
  # The repo is organised under a single top-level `EditMe/` folder
  # (one sub-folder per website-menu section) plus a few items pinned at
  # the repo root. The mounts block below remaps each EditMe/ folder onto
  # the targets Hugo expects (content/, layouts/, data/, ...).
  #
  # During the EditMe migration the `_automation/scripts/generate_mounts.py`
  # script falls back to the legacy section-driven paths from PR #10
  # (writings/, people/, ...) wherever EditMe/ is still empty, so the
  # build keeps working as content moves over.
  #
  # DO NOT EDIT THE BLOCK BETWEEN THE MARKERS BELOW BY HAND.
  # Run: `python3 _automation/scripts/generate_mounts.py` after adding or
  # removing folders under EditMe/. CI also runs this with --check on every
  # build to catch drift.
  mounts:
