baseURL: "https://gking.github.io/"
title: "Gary King"
languageCode: en-us
copyright: "Gary King"
enableGitInfo: false
enableEmoji: true
hasCSSJSConfigInAssets: true

module:
  imports:
    - path: github.com/HugoBlox/hugo-blox-builder/modules/blox-plugin-netlify
    - path: github.com/HugoBlox/hugo-blox-builder/modules/blox-tailwind

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    lineNos: false
  tableOfContents:
    endLevel: 3
    startLevel: 2

imaging:
  resampleFilter: CatmullRom
  quality: 75
  anchor: smart

outputs:
  home:
    - HTML
    - RSS
    - JSON

params:
  appearance:
    theme_day: custom
    font: native
    font_size: L
  marketing:
    seo:
      site_type: Person
      local_business_type: ""
      org_name: "Gary King"
      description: "Gary King - Weatherhead University Professor at Harvard University"
  header:
    navbar:
      enable: true
      fixed: true
      highlight_active_link: true
  footer:
    copyright:
      notice: "© {year} Gary King. All rights reserved."
  features:
    math:
      enable: false
    search:
      provider: flexsearch
  publications:
    citation_style: apa
  extensions:
    css:
      - css/custom.css

taxonomies:
  tag: tags
  category: categories
  publication_type: publication_types
  author: authors

menus:
  main:
    - name: Home
      url: /
      weight: 10
    - name: Bio & CV
      url: /bio/
      weight: 20
    - name: Publications
      url: /publication/
      weight: 30
    - name: Software
      url: /software/
      weight: 40
    - name: Presentations
      url: /talk/
      weight: 50

permalinks:
  publication: /publication/:slug/
  talk: /talk/:slug/
  software: /software/:slug/
