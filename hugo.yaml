    - {source: EditMe/Writings/Presentations/Unsorted,                            target: content/talk}
    - {source: _site/data,                                                        target: data} # cross-section data files
    - {source: EditMe/Writings/Data,                                              target: data}
    - {source: EditMe/Software/Data,                                              target: data}
    - {source: EditMe/Dataverse/Data,                                             target: data}
    - {source: EditMe/People/Data,                                                target: data}
    - {source: EditMe/ResearchAreas/Data,                                         target: data}
    - {source: EditMe/Redirects/Data,                                             target: data}
    - {source: assets,                                                            target: assets} # pinned at root: HugoBlox theme uses fileExists
    - {source: _site/static,                                                      target: static}
    - {source: _site/archetypes,                                                  target: archetypes}
    - {source: _site/i18n,                                                        target: i18n}
    # === END AUTO-GENERATED MOUNTS ===

markup:
  goldmark:
    renderer:
      unsafe: true
    extensions:
      linkify: true
  highlight:
    lineNos: false
  tableOfContents:
    endLevel: 3
    startLevel: 2

imaging:
  resampleFilter: CatmullRom
  quality: 75
  anchor: smart

outputs:
  home:
    - HTML
    - RSS
    - JSON

params:
  appearance:
    theme_day: custom
    theme_night: custom
    color_mode: light
    font: native
    font_size: L
  marketing:
    seo:
      site_type: Person
      local_business_type: ""
      org_name: "Gary King"
      description: "Gary King - Weatherhead University Professor at Harvard University"
  header:
    navbar:
      enable: true
      fixed: true
      highlight_active_link: true
      show_search: true
  footer:
    copyright:
      notice: "© {year} Gary King. All rights reserved."
  features:
    math:
      enable: false
    search:
      provider: flexsearch
  publications:
    citation_style: apa
  extensions:
    css:
      - css/custom.css

taxonomies:
  tag: tags
  category: categories
  publication_type: publication_types
  author: authors

menus:
  main:
    - name: Bio & C.V.
      url: /bio/
      weight: 10
    - name: Writings
      url: /publication/
      weight: 20
    - name: Research Areas
      url: /#research-areas
      weight: 30
    - name: Software
      url: /software/
      weight: 40
    - name: Dataverse
      url: /dataverse/
      weight: 50
    - name: People
      url: /research-group/
      weight: 60
    - name: Teaching
      url: /teaching/
      weight: 70
    - name: Contact
      url: /contact/
      weight: 80

permalinks:
  publication: /publication/:slug/
  talk: /talk/:slug/
  software: /software/:slug/
