{{ define "main" }}
<style>
  .page-body.my-10 { margin: 0 !important; }
  @media (max-width: 600px) {
    .gk-chatbot-iframe { display: none !important; }
  }
</style>
<iframe
  class="gk-chatbot-iframe"
  src="https://gking-avatar-deploy-750630108795.s3.us-east-2.amazonaws.com/chat/index.html"
  style="width:100%;height:calc(100vh - var(--navbar-height, 64px));border:0;display:block"
  title="Chat with Gary King's AI Avatar"
  allow="clipboard-write"
  loading="lazy"></iframe>
<script>
(function() {
  if (window.innerWidth <= 600 && window.GKingChat) {
    window.GKingChat.open();
  } else {
    var check = setInterval(function() {
      if (window.GKingChat) {
        if (window.innerWidth <= 600) window.GKingChat.open();
        clearInterval(check);
      }
    }, 200);
    setTimeout(function() { clearInterval(check); }, 5000);
  }
})();
</script>
{{ end }}
