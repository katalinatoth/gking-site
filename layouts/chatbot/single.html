{{ define "main" }}
<style>
  .page-body.my-10 { margin: 0 !important; }
  @media (max-width: 600px) {
    .gk-chatbot-iframe { display: none !important; }
    .page-body.my-10 { padding: 0 !important; }
    #site-header.header { position: relative; z-index: 9999; }
  }
</style>
<iframe
  class="gk-chatbot-iframe"
  src="https://gking-avatar-deploy-750630108795.s3.us-east-2.amazonaws.com/chat/index.html"
  style="width:100%;height:calc(100vh - var(--navbar-height, 64px));border:0;display:block"
  title="Chat with Gary King's AI Avatar"
  allow="clipboard-write"
  loading="lazy"></iframe>
<script>
(function() {
  if (window.innerWidth > 600) return;

  function setup() {
    if (!window.GKingChat) return false;
    var host = document.getElementById('gking-chat-widget');
    if (!host || !host.shadowRoot) return false;

    var shadow = host.shadowRoot;

    var embedStyle = document.createElement('style');
    embedStyle.textContent = [
      '.btn { display: none !important; }',
      '.header .close { display: none !important; }',
      '.panel {',
      '  position: fixed !important;',
      '  top: var(--navbar-height, 64px) !important;',
      '  left: 0 !important; right: 0 !important; bottom: 0 !important;',
      '  width: 100% !important; height: auto !important;',
      '  border-radius: 0 !important; border: none !important;',
      '  box-shadow: none !important;',
      '  z-index: 100 !important;',
      '}'
    ].join('\n');
    shadow.appendChild(embedStyle);

    window.GKingChat.open();
    window.GKingChat.close = function() {};

    return true;
  }

  if (!setup()) {
    var check = setInterval(function() {
      if (setup()) clearInterval(check);
    }, 150);
    setTimeout(function() { clearInterval(check); }, 5000);
  }
})();
</script>
{{ end }}
