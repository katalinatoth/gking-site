{{ define "main" }}

<div class="max-w-7xl mx-auto px-6 py-12">
  <h1 class="text-4xl font-bold tracking-tight text-slate-900 dark:text-slate-100 mb-4">{{ .Title }}</h1>

  <div class="prose prose-slate lg:prose-lg dark:prose-invert max-w-none mb-6">
    {{ .Content }}
  </div>

  <iframe
    id="dv-iframe"
    src="https://dataverse.harvard.edu/dataverse/king"
    style="width:100%;height:calc(100vh - 120px);min-height:600px;border:1px solid #ddd;border-radius:6px;display:block;background:#fff"
    title="Gary King's Harvard Dataverse Collection"
    referrerpolicy="no-referrer-when-downgrade"></iframe>

  <noscript>
    <p><a href="https://dataverse.harvard.edu/dataverse/king">View Gary King's Dataverse collection</a></p>
  </noscript>
</div>

{{ end }}
