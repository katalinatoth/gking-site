{{ define "main" }}

<div class="max-w-7xl mx-auto px-6 py-12">
  <h1 class="text-4xl font-bold tracking-tight text-slate-900 dark:text-slate-100 mb-4">{{ .Title }}</h1>

  <div class="prose prose-slate lg:prose-lg dark:prose-invert max-w-none mb-6">
    {{ .Content }}
  </div>

  <!-- Dataverse Widget -->
  <div id="dv-app">
    <div id="dv-chrome">
      <div id="dv-toolbar">
        <a href="https://dataverse.harvard.edu/" target="_blank" rel="noopener">Harvard Dataverse</a>
        <span class="dv-sep">&gt;</span>
        <div id="dv-search-wrap">
          <label for="dv-search" class="sr-only">Search this dataverse</label>
          <input id="dv-search" type="text" placeholder="Search this dataverse..." aria-label="Search this dataverse">
          <button id="dv-search-btn" type="button" aria-label="Search">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true" focusable="false"><path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85zm-5.242.156a5 5 0 1 1 0-10 5 5 0 0 1 0 10z"/></svg>
          </button>
        </div>
        <a href="https://dataverse.harvard.edu/dataverse/king" target="_blank" rel="noopener" class="dv-adv-link">Advanced Search</a>
      </div>

      <div id="dv-body">
        <div id="dv-sidebar">
          <div class="dv-facet-group">
            <label class="dv-type-check"><input type="checkbox" checked disabled>
              <svg class="dv-icon" viewBox="0 0 16 16" fill="#337ab7" width="14" height="14"><path d="M2 2a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V2z"/></svg>
              Dataverses (0)</label>
            <label class="dv-type-check"><input type="checkbox" checked disabled>
              <svg class="dv-icon" viewBox="0 0 16 16" fill="#337ab7" width="14" height="14"><path d="M5 1a2 2 0 0 0-2 2v1h10V3a2 2 0 0 0-2-2H5zM3 5v8a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2V5H3z"/></svg>
              Datasets (<span id="dv-total-count">0</span>)</label>
            <label class="dv-type-check dv-type-unchecked"><input type="checkbox" disabled>
              <svg class="dv-icon" viewBox="0 0 16 16" fill="#999" width="14" height="14"><path d="M4 0a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V4.414A2 2 0 0 0 13.414 3L11 .586A2 2 0 0 0 9.586 0H4z"/></svg>
              Files (1,590)</label>
          </div>

          <div class="dv-facet-group">
            <div class="dv-facet-title">Publication Year</div>
            <div id="dv-facet-year"></div>
          </div>

          <div class="dv-facet-group">
            <div class="dv-facet-title">Subject</div>
            <div id="dv-facet-subject"></div>
          </div>

          <div class="dv-facet-group">
            <div class="dv-facet-title">Author Name</div>
            <div id="dv-facet-author"></div>
          </div>

          <div class="dv-facet-group">
            <div class="dv-facet-title">Keyword Term</div>
            <div id="dv-facet-keyword"></div>
          </div>
        </div>

        <div id="dv-main">
          <div id="dv-results-header">
            <span id="dv-result-info"></span>
            <div id="dv-sort-wrap">
              <button id="dv-sort-btn">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M3.5 2.5a.5.5 0 0 0-1 0v8.793l-1.146-1.147a.5.5 0 0 0-.708.708l2 2a.5.5 0 0 0 .708 0l2-2a.5.5 0 0 0-.708-.708L3.5 11.293V2.5zm3.5 1a.5.5 0 0 1 .5-.5h7a.5.5 0 0 1 0 1h-7a.5.5 0 0 1-.5-.5zM7.5 6a.5.5 0 0 0 0 1h5a.5.5 0 0 0 0-1h-5zm0 3a.5.5 0 0 0 0 1h3a.5.5 0 0 0 0-1h-3zm0 3a.5.5 0 0 0 0 1h1a.5.5 0 0 0 0-1h-1z"/></svg>
                Sort
              </button>
              <div id="dv-sort-menu" class="dv-dropdown-hidden">
                <a href="#" data-sort="date" data-order="desc" class="dv-sort-active">Date (newest)</a>
                <a href="#" data-sort="date" data-order="asc">Date (oldest)</a>
                <a href="#" data-sort="name" data-order="asc">Name (A-Z)</a>
                <a href="#" data-sort="name" data-order="desc">Name (Z-A)</a>
              </div>
            </div>
          </div>
          <div id="dv-results">
            <div class="dv-loading">Initializing...</div>
          </div>
          <div id="dv-pagination"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<style>
  #dv-app {
    font-family: "Lucida Grande", "Lucida Sans Unicode", Helvetica, Arial, sans-serif;
    font-size: 14px;
    color: #333;
    line-height: 1.5;
  }
  #dv-app * { box-sizing: border-box; }
  #dv-app a { color: #337ab7; text-decoration: none; }
  #dv-app a:hover { color: #23527c; text-decoration: underline; }

  /* Toolbar */
  #dv-toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    background: #f5f5f5;
    border: 1px solid #ddd;
    border-bottom: 1px solid #ccc;
    flex-wrap: wrap;
  }
  .dv-sep { color: #999; font-size: 12px; }
  #dv-search-wrap {
    display: flex;
    flex: 1;
    max-width: 340px;
  }
  #dv-search {
    flex: 1;
    padding: 5px 10px;
    border: 1px solid #ccc;
    border-right: none;
    border-radius: 3px 0 0 3px;
    font-size: 13px;
    outline: none;
  }
  #dv-search:focus { border-color: #66afe9; }
  #dv-search-btn {
    padding: 5px 10px;
    background: #337ab7;
    color: #fff;
    border: 1px solid #2e6da4;
    border-radius: 0 3px 3px 0;
    cursor: pointer;
    display: flex;
    align-items: center;
  }
  #dv-search-btn:hover { background: #286090; }
  .dv-adv-link { font-size: 13px; margin-left: 4px; }

  /* Body layout */
  #dv-body {
    display: flex;
    border: 1px solid #ddd;
    border-top: none;
    min-height: 500px;
    background: #fff;
  }

  /* Sidebar */
  #dv-sidebar {
    width: 220px;
    min-width: 220px;
    border-right: 1px solid #ddd;
    padding: 0;
    font-size: 13px;
    overflow-y: auto;
  }
  .dv-facet-group {
    padding: 10px 14px;
    border-bottom: 1px solid #eee;
  }
  .dv-facet-title {
    font-weight: bold;
    font-size: 13px;
    color: #333;
    margin-bottom: 6px;
  }
  .dv-type-check {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 13px;
    margin: 3px 0;
    color: #337ab7;
    cursor: default;
  }
  .dv-type-unchecked { color: #999; }
  .dv-icon { flex-shrink: 0; }
  .dv-facet-link {
    display: block;
    padding: 1px 0;
    font-size: 13px;
    color: #337ab7;
    cursor: pointer;
  }
  .dv-facet-link:hover { text-decoration: underline; }
  .dv-facet-link.active { font-weight: bold; }
  .dv-facet-more {
    display: block;
    margin-top: 4px;
    font-size: 12px;
    color: #337ab7;
    cursor: pointer;
  }

  /* Main results area */
  #dv-main {
    flex: 1;
    padding: 12px 16px;
  }
  #dv-results-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid #eee;
  }
  #dv-result-info { font-size: 13px; color: #555; }

  /* Sort dropdown */
  #dv-sort-wrap { position: relative; }
  #dv-sort-btn {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 5px 12px;
    background: #fff;
    border: 1px solid #ccc;
    border-radius: 3px;
    cursor: pointer;
    font-size: 13px;
    color: #333;
  }
  #dv-sort-btn:hover { background: #f5f5f5; }
  #dv-sort-menu {
    position: absolute;
    right: 0;
    top: 100%;
    background: #fff;
    border: 1px solid #ccc;
    border-radius: 3px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    z-index: 100;
    min-width: 150px;
  }
  #dv-sort-menu a {
    display: block;
    padding: 6px 14px;
    font-size: 13px;
    color: #333;
    text-decoration: none;
  }
  #dv-sort-menu a:hover { background: #f5f5f5; }
  #dv-sort-menu a.dv-sort-active { font-weight: bold; color: #337ab7; }
  .dv-dropdown-hidden { display: none; }

  /* Result cards */
  .dv-card {
    border: 1px solid #c0d4e8;
    border-radius: 4px;
    padding: 14px 16px;
    margin-bottom: 12px;
    background: #fff;
    position: relative;
  }
  .dv-card:hover { border-color: #93b8d7; }
  .dv-card-title {
    font-size: 14px;
    font-weight: normal;
    margin: 0 0 4px 0;
  }
  .dv-card-title a { color: #337ab7; }
  .dv-card-date {
    font-size: 12px;
    color: #595959;
    margin-bottom: 6px;
  }
  .dv-card-icon {
    float: left;
    margin-right: 10px;
    margin-top: 2px;
    width: 48px;
    text-align: center;
  }
  .dv-card-icon img {
    width: 40px;
    height: auto;
    opacity: 0.6;
  }
  .dv-card-citation {
    font-size: 12px;
    color: #555;
    margin-bottom: 6px;
    line-height: 1.4;
    word-break: break-word;
  }
  .dv-card-desc {
    font-size: 13px;
    color: #444;
    line-height: 1.5;
    margin-top: 8px;
  }
  .dv-card-actions {
    position: absolute;
    top: 10px;
    right: 12px;
    display: flex;
    gap: 6px;
  }
  .dv-card-actions a {
    color: #999;
    font-size: 14px;
  }
  .dv-card-actions a:hover { color: #337ab7; }

  .dv-loading {
    text-align: center;
    padding: 40px;
    color: #595959;
    font-size: 14px;
  }

  /* Pagination */
  #dv-pagination {
    display: flex;
    justify-content: center;
    gap: 2px;
    margin-top: 16px;
    padding-top: 12px;
  }
  .dv-pg {
    padding: 5px 10px;
    border: 1px solid #ddd;
    background: #fff;
    color: #337ab7;
    cursor: pointer;
    font-size: 13px;
    border-radius: 3px;
    text-decoration: none;
    display: inline-block;
  }
  .dv-pg:hover { background: #eee; text-decoration: none; }
  .dv-pg.active { background: #337ab7; color: #fff; border-color: #337ab7; }
  .dv-pg.disabled { color: #ccc; cursor: default; pointer-events: none; }

  /* Responsive */
  @media (max-width: 768px) {
    #dv-sidebar { display: none; }
    #dv-body { flex-direction: column; }
    #dv-search-wrap { max-width: 100%; }
  }
</style>

<script>
(function() {
  var PER_PAGE = 10;

  var state = {
    q: '', sort: 'date', order: 'desc', start: 0,
    facets: { year: null, subject: null, author: null, keyword: null }
  };

  var ALL_DATA = {{ $.Site.Data.dataverse | jsonify | safeJS }};
  var allItems = ALL_DATA;
  var FACET_LIMIT = 5;
  var expandedFacets = { year: false, subject: false, author: false, keyword: false };

  function countBy(items, fn) {
    var m = {};
    items.forEach(function(it) {
      var vals = fn(it);
      if (!Array.isArray(vals)) vals = [vals];
      vals.forEach(function(v) { if (v) m[v] = (m[v] || 0) + 1; });
    });
    return m;
  }

  function renderFacet(elId, counts, facetKey, sortByKey) {
    var el = document.getElementById(elId);
    var entries = Object.entries(counts);
    if (sortByKey) entries.sort(function(a, b) { return b[0] - a[0]; });
    else entries.sort(function(a, b) { return b[1] - a[1]; });

    var limit = expandedFacets[facetKey] ? entries.length : FACET_LIMIT;
    var shown = entries.slice(0, limit);
    var activeVal = state.facets[facetKey];

    var html = shown.map(function(e) {
      var isActive = activeVal === e[0];
      return '<a class="dv-facet-link' + (isActive ? ' active' : '') +
        '" data-facet="' + facetKey + '" data-val="' + e[0].replace(/"/g, '&quot;') + '">' +
        e[0] + ' (' + e[1] + ')</a>';
    }).join('');

    if (entries.length > FACET_LIMIT) {
      if (!expandedFacets[facetKey]) {
        html += '<a class="dv-facet-more" data-expand="' + facetKey + '">More...</a>';
      }
    }

    el.innerHTML = html;

    el.querySelectorAll('.dv-facet-link').forEach(function(a) {
      a.addEventListener('click', function(ev) {
        ev.preventDefault();
        var k = this.dataset.facet;
        var v = this.dataset.val;
        state.facets[k] = state.facets[k] === v ? null : v;
        state.start = 0;
        render();
      });
    });

    var moreLink = el.querySelector('.dv-facet-more');
    if (moreLink) {
      moreLink.addEventListener('click', function(ev) {
        ev.preventDefault();
        expandedFacets[this.dataset.expand] = true;
        render();
      });
    }
  }

  function matchesSearch(it, q) {
    if (!q) return true;
    var ql = q.toLowerCase();
    return (it.name || '').toLowerCase().indexOf(ql) !== -1 ||
      (it.description || '').toLowerCase().indexOf(ql) !== -1 ||
      (it.authors || []).join(' ').toLowerCase().indexOf(ql) !== -1 ||
      (it.keywords || []).join(' ').toLowerCase().indexOf(ql) !== -1;
  }

  function filter(items) {
    return items.filter(function(it) {
      if (!matchesSearch(it, state.q)) return false;
      var f = state.facets;
      if (f.year) {
        var y = it.published_at ? it.published_at.substring(0, 4) : null;
        if (y !== f.year) return false;
      }
      if (f.subject && !(it.subjects || []).includes(f.subject)) return false;
      if (f.author && !(it.authors || []).includes(f.author)) return false;
      if (f.keyword && !(it.keywords || []).includes(f.keyword)) return false;
      return true;
    });
  }

  function sortItems(items) {
    return items.slice().sort(function(a, b) {
      if (state.sort === 'date') {
        var da = a.published_at || '', db = b.published_at || '';
        return state.order === 'desc' ? db.localeCompare(da) : da.localeCompare(db);
      } else {
        var na = (a.name || '').toLowerCase(), nb = (b.name || '').toLowerCase();
        return state.order === 'asc' ? na.localeCompare(nb) : nb.localeCompare(na);
      }
    });
  }

  function esc(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function fmtDate(iso) {
    if (!iso) return '';
    var d = new Date(iso);
    var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
  }

  function renderResults(items) {
    var filtered = filter(items);
    var sorted = sortItems(filtered);
    var total = sorted.length;
    var start = state.start;
    var pageItems = sorted.slice(start, start + PER_PAGE);

    document.getElementById('dv-total-count').textContent = total;
    document.getElementById('dv-result-info').textContent =
      total > 0 ? (start + 1) + ' to ' + Math.min(start + PER_PAGE, total) + ' of ' + total + ' Results' : '0 Results';

    if (pageItems.length === 0) {
      document.getElementById('dv-results').innerHTML = '<div class="dv-loading">No datasets found.</div>';
      document.getElementById('dv-pagination').innerHTML = '';
      return;
    }

    var html = pageItems.map(function(it) {
      var desc = it.description || '';
      if (desc.length > 350) desc = desc.substring(0, 350) + '...';
      var authors = (it.authors || []).join('; ');
      var date = fmtDate(it.published_at);
      var citation = it.citation || '';
      var citationHtml = it.citationHtml || esc(citation);
      var pub = it.name_of_dataverse || it.publisher || '';

      return '<div class="dv-card">' +
        '<div class="dv-card-actions">' +
          '<a href="' + esc(it.url) + '" target="_blank" title="View dataset" rel="noopener">' +
            '<svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M4.5 0A2.5 2.5 0 0 0 2 2.5v11A2.5 2.5 0 0 0 4.5 16h7A2.5 2.5 0 0 0 14 13.5v-8a.5.5 0 0 0-.146-.354l-5-5A.5.5 0 0 0 8.5 0H4.5zM8 1.5v3A1.5 1.5 0 0 0 9.5 6H13v7.5A1.5 1.5 0 0 1 11.5 15h-7A1.5 1.5 0 0 1 3 13.5v-11A1.5 1.5 0 0 1 4.5 1H8z"/></svg>' +
          '</a>' +
          '<a href="' + esc(it.url) + '" target="_blank" title="Open DOI" rel="noopener">' +
            '<svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M6.354 5.5H4a3 3 0 0 0 0 6h3a3 3 0 0 0 2.83-4H9.4A2 2 0 0 1 7 9.5H4a2 2 0 1 1 0-4h2.354zM9.646 5.5H12a3 3 0 1 1 0 6H9a3 3 0 0 1-2.83-4H6.6A2 2 0 0 0 9 9.5h3a2 2 0 1 0 0-4H9.646z"/></svg>' +
          '</a>' +
        '</div>' +
        '<div class="dv-card-title"><a href="' + esc(it.url) + '" target="_blank" rel="noopener">' + esc(it.name) + '</a></div>' +
        '<div class="dv-card-date">' + esc(date) + (pub ? ' - ' + esc(pub) : '') + '</div>' +
        '<div class="dv-card-icon">' +
          '<svg width="40" height="48" viewBox="0 0 40 48" fill="none"><rect x="2" y="2" width="36" height="44" rx="3" stroke="#a0c4e8" stroke-width="2" fill="#e8f0f8"/>' +
          '<rect x="8" y="10" width="24" height="2" rx="1" fill="#a0c4e8"/><rect x="8" y="16" width="24" height="2" rx="1" fill="#a0c4e8"/>' +
          '<rect x="8" y="22" width="18" height="2" rx="1" fill="#a0c4e8"/><rect x="8" y="28" width="20" height="2" rx="1" fill="#a0c4e8"/>' +
          '<rect x="8" y="34" width="14" height="2" rx="1" fill="#a0c4e8"/></svg>' +
        '</div>' +
        '<div class="dv-card-citation">' + citationHtml + '</div>' +
        (desc ? '<div class="dv-card-desc">' + esc(desc) + '</div>' : '') +
        '<div style="clear:both;"></div>' +
      '</div>';
    }).join('');

    document.getElementById('dv-results').innerHTML = html;

    var totalPages = Math.ceil(total / PER_PAGE);
    var curPage = Math.floor(start / PER_PAGE);
    if (totalPages <= 1) { document.getElementById('dv-pagination').innerHTML = ''; return; }

    var pHtml = '<a class="dv-pg' + (curPage === 0 ? ' disabled' : '') + '" data-p="' + (curPage - 1) + '">&laquo;</a>';
    var sp = Math.max(0, curPage - 3), ep = Math.min(totalPages, sp + 7);
    for (var i = sp; i < ep; i++) {
      pHtml += '<a class="dv-pg' + (i === curPage ? ' active' : '') + '" data-p="' + i + '">' + (i + 1) + '</a>';
    }
    pHtml += '<a class="dv-pg' + (curPage >= totalPages - 1 ? ' disabled' : '') + '" data-p="' + (curPage + 1) + '">&raquo;</a>';

    var pagEl = document.getElementById('dv-pagination');
    pagEl.innerHTML = pHtml;
    pagEl.querySelectorAll('.dv-pg').forEach(function(a) {
      a.addEventListener('click', function(ev) {
        ev.preventDefault();
        if (this.classList.contains('disabled') || this.classList.contains('active')) return;
        state.start = parseInt(this.dataset.p) * PER_PAGE;
        renderResults(allItems);
        document.getElementById('dv-app').scrollIntoView({ behavior: 'smooth' });
      });
    });
  }

  function render() {
    if (!allItems) return;
    var years = countBy(allItems, function(it) { return it.published_at ? it.published_at.substring(0, 4) : null; });
    var subjects = countBy(allItems, function(it) { return it.subjects || []; });
    var authors = countBy(allItems, function(it) { return it.authors || []; });
    var keywords = countBy(allItems, function(it) { return it.keywords || []; });

    renderFacet('dv-facet-year', years, 'year', true);
    renderFacet('dv-facet-subject', subjects, 'subject', false);
    renderFacet('dv-facet-author', authors, 'author', false);
    renderFacet('dv-facet-keyword', keywords, 'keyword', false);
    renderResults(allItems);
  }

  function doSearch() {
    state.q = document.getElementById('dv-search').value.trim();
    state.start = 0;
    state.facets = { year: null, subject: null, author: null, keyword: null };
    expandedFacets = { year: false, subject: false, author: false, keyword: false };
    render();
  }

  function init() {
    render();

    document.getElementById('dv-search-btn').addEventListener('click', doSearch);
    document.getElementById('dv-search').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') doSearch();
    });

    var sortBtn = document.getElementById('dv-sort-btn');
    var sortMenu = document.getElementById('dv-sort-menu');
    sortBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      sortMenu.classList.toggle('dv-dropdown-hidden');
    });
    document.addEventListener('click', function() {
      sortMenu.classList.add('dv-dropdown-hidden');
    });
    sortMenu.querySelectorAll('a').forEach(function(a) {
      a.addEventListener('click', function(e) {
        e.preventDefault();
        state.sort = this.dataset.sort;
        state.order = this.dataset.order;
        state.start = 0;
        sortMenu.querySelectorAll('a').forEach(function(x) { x.classList.remove('dv-sort-active'); });
        this.classList.add('dv-sort-active');
        sortMenu.classList.add('dv-dropdown-hidden');
        render();
      });
    });
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();
})();
</script>

{{ end }}
