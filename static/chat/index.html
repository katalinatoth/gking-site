<script>
(function() {
  var WELCOME = "This is Gary King\u2019s AI chatbot. How can I help?";
  var OLD_WELCOME = "Hello, I\u2019m Gary King. Let\u2019s discuss the intersection of politics and quantitative analysis.";

    });
  }

})();
