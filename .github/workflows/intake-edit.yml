name: Apply PR comment edits

# Triggered when a maintainer posts a comment on an open intake PR.
# If the comment contains slash commands like `/title ...`, `/authors ...`,
# `/year ...`, `/abstract ...`, `/doi ...`, `/publication ...`, `/type ...`,
# we apply them to every publication index.md added/changed by the PR,
# commit the result back to the PR branch, react +1 to the comment, and
# post a follow-up comment listing what changed and any warnings.
#
# This is the "edit-from-the-comment-thread" half of the intake flow.
# The "auto-populate-from-the-PDF" half lives in intake-publication.yml.

on:
  issue_comment:
    types: [created, edited]

permissions:
  contents: write
  pull-requests: write

jobs:
  edit:
    # Three guards: only PR comments, never our own follow-ups (loop
    # protection), and only run if the body even contains a slash. The
    # script itself does the precise parsing - this just keeps the job
    # from booting up for every "looks good!" comment.
    if: >-
      github.event.issue.pull_request != null
      && github.event.comment.user.login != 'github-actions[bot]'
      && contains(github.event.comment.body, '/')
    runs-on: ubuntu-latest

    steps:
      - name: Look up PR head ref and state
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              pull_number: context.issue.number,
            });
            core.setOutput('head_ref',  pr.data.head.ref);
            core.setOutput('head_repo', pr.data.head.repo.full_name);
            core.setOutput('base_repo', context.repo.owner + '/' + context.repo.repo);
            core.setOutput('state',     pr.data.state);
            core.setOutput('number',    String(pr.data.number));

      - name: Skip if PR is closed or from a fork
        id: gate
        run: |
          if [ "${{ steps.pr.outputs.state }}" != "open" ]; then
            echo "PR is not open; skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "${{ steps.pr.outputs.head_repo }}" != "${{ steps.pr.outputs.base_repo }}" ]; then
            echo "PR is from a fork; GITHUB_TOKEN can't push back to it. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Checkout PR branch
        if: steps.gate.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        if: steps.gate.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        if: steps.gate.outputs.skip != 'true'
        run: pip install pyyaml certifi pymupdf

      - name: Save comment body to a file
        if: steps.gate.outputs.skip != 'true'
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          # Use printf to avoid `echo`'s flag-eating behaviour and to
          # preserve every byte of the comment exactly.
          printf '%s' "$COMMENT_BODY" > /tmp/comment_body.txt
          echo "Comment body saved ($(wc -c < /tmp/comment_body.txt) bytes)."

      - name: Find publication index.md files added/modified by this PR
        if: steps.gate.outputs.skip != 'true'
        id: targets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          set -euo pipefail
          # The PR's diff against base, restricted to publication index.md
          # files. This catches both the index.md created by the auto-
          # import workflow and any subsequent manual edits in the same PR.
          gh pr view "$PR_NUMBER" --json files -q '.files[].path' > /tmp/pr_files.txt || true
          grep -E '^content/publication/[^/]+/index\.md$' /tmp/pr_files.txt \
            | sort -u > /tmp/targets.txt || true
          if [ ! -s /tmp/targets.txt ]; then
            echo "No publication index.md in this PR's diff; nothing to edit."
            echo "any=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "any=true" >> "$GITHUB_OUTPUT"
          echo "Targets:"
          cat /tmp/targets.txt

      - name: Apply edits
        if: steps.gate.outputs.skip != 'true' && steps.targets.outputs.any == 'true'
        run: |
          set -euo pipefail
          mapfile -t targets < /tmp/targets.txt
          python3 scripts/apply_pr_edits.py \
            --comment /tmp/comment_body.txt \
            --report  /tmp/edit_report.json \
            "${targets[@]}"
          echo "----- report -----"
          cat /tmp/edit_report.json

      - name: Build feedback summary
        if: steps.gate.outputs.skip != 'true' && steps.targets.outputs.any == 'true'
        run: |
          python3 - <<'PY' > /tmp/edit_summary.md
          import json, os
          with open("/tmp/edit_report.json") as f:
              r = json.load(f)
          out = []
          if not r.get("commands_seen"):
              out.append("_No slash commands recognised in this comment, "
                        "so nothing was changed._")
              out.append("")
              out.append("If you meant to edit a field, double-check the "
                        "command list in the bot's first comment on this PR.")
              print("\n".join(out)); raise SystemExit(0)
          if not r.get("any_changes"):
              out.append("Saw the slash commands but couldn't apply any of them. "
                        "See warnings below:")
          else:
              out.append("Done - applied your edits and pushed a follow-up commit.")
              out.append("")
              changed = set()
              for f in r.get("files", []):
                  for c in f.get("changes", []):
                      changed.add(c.replace(" (cleared)", ""))
              if changed:
                  out.append(f"**Fields updated:** {', '.join(sorted(changed))}")
          # Per-file rollup so multi-PDF PRs are unambiguous.
          warnings = []
          unknown  = set()
          for f in r.get("files", []):
              warnings.extend(f.get("warnings", []))
              for u in f.get("unknown_cmds", []):
                  unknown.add(u)
          if warnings:
              out.append("")
              out.append("**Warnings:**")
              for w in warnings:
                  out.append(f"- {w}")
          if unknown:
              out.append("")
              out.append("**Unrecognised commands:** "
                        + ", ".join(f"`/{u}`" for u in sorted(unknown)))
              out.append("")
              out.append("Valid commands: `/title`, `/authors`, `/year`, "
                        "`/date`, `/abstract`, `/publication`, `/doi`, `/type`")
          out.append("")
          out.append("---")
          out.append("Want to make more changes? Just post another comment with "
                    "more slash commands, or edit `index.md` directly in the "
                    "**Files changed** tab.")
          print("\n".join(out))
          PY
          echo "----- summary -----"
          cat /tmp/edit_summary.md

      - name: Configure git
        if: steps.gate.outputs.skip != 'true' && steps.targets.outputs.any == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit and push edits
        if: steps.gate.outputs.skip != 'true' && steps.targets.outputs.any == 'true'
        env:
          COMMENT_URL: ${{ github.event.comment.html_url }}
        run: |
          set -euo pipefail
          git add -A
          if git diff --cached --quiet; then
            echo "No file diff after applying edits; nothing to commit."
            exit 0
          fi
          git commit -m "$(cat <<EOF
          Apply edits from PR comment

          Source: $COMMENT_URL
          EOF
          )"
          git push origin HEAD:${{ steps.pr.outputs.head_ref }}

      - name: React +1 and post summary on the comment
        if: steps.gate.outputs.skip != 'true' && steps.targets.outputs.any == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            let body = '_(no summary captured)_';
            try {
              body = fs.readFileSync('/tmp/edit_summary.md', 'utf8');
            } catch (e) {
              core.warning('Could not read edit summary: ' + e.message);
            }
            try {
              await github.rest.reactions.createForIssueComment({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                comment_id: context.payload.comment.id,
                content: '+1',
              });
            } catch (e) {
              core.warning('Could not add reaction: ' + e.message);
            }
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo:  context.repo.repo,
              body,
            });
