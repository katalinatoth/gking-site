name: Auto-import publication from issue form

# Triggered when somebody opens an issue using the "Upload a paper"
# Issue Form (.github/ISSUE_TEMPLATE/upload-paper.yml). The form
# auto-applies the `intake` label, which is how this workflow gates.
#
# Maintainer flow (no terminal needed):
#   1. On github.com, click "New issue" -> "Upload a paper".
#   2. Drag the main PDF into the textarea, type a short URL (or
#      leave blank), drag any supplementary PDFs into the next box,
#      submit.
#   3. Wait ~2 minutes. The bot:
#        - downloads the PDFs from GitHub's user-attachments CDN
#        - runs intake_publication.py to extract title/authors/abstract
#        - extracts every numbered figure as a thumbnail
#        - opens a draft PR with a rich preview (abstract + figure
#          picker + supplementary list + edit instructions)
#        - closes the issue with a link to the PR
#   4. Edit `index.md` directly in the PR's "Files changed" tab,
#      or post `/figure N` / `/title …` / `/abstract …` / etc.
#   5. Merge -> deploy -> live.

on:
  issues:
    # `opened` covers the normal flow where the Issue Form auto-applies
    # the `intake` label. `labeled` is a rescue path: if somebody
    # uploads via a template that didn't carry the label (e.g. an old
    # cached template, or a manually-created issue), a maintainer can
    # add the `intake` label by hand and the bot will pick it up.
    # The `intake-handled` gate inside the job prevents re-runs.
    types: [opened, labeled]

permissions:
  contents: write
  issues: write
  pull-requests: write

# Belt-and-braces: serialise per-issue runs so a body-edit retrigger
# (if we ever turn `edited` back on) can't open two PRs in parallel
# for the same upload.
concurrency:
  group: intake-from-issue-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  intake:
    # Only run for issues carrying the `intake` label, and never for
    # the bot's own follow-up edits (loop protection).
    if: >-
      github.event.issue.user.login != 'github-actions[bot]'
      && contains(github.event.issue.labels.*.name, 'intake')
    runs-on: ubuntu-latest
    steps:
      - name: Skip if a PR has already been opened for this issue
        id: gate
        uses: actions/github-script@v7
        with:
          script: |
            // The bot adds a `intake-handled` label after a successful
            // PR open, so re-edits to the same issue don't re-fire the
            // import. Maintainers can remove the label to force a redo.
            const labels = (context.payload.issue.labels || []).map(l => l.name);
            if (labels.includes('intake-handled')) {
              core.notice('Issue already processed (intake-handled); skipping.');
              core.setOutput('skip', 'true');
            } else {
              core.setOutput('skip', 'false');
            }

      - name: Checkout main
        if: steps.gate.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        if: steps.gate.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        if: steps.gate.outputs.skip != 'true'
        run: pip install pyyaml certifi pymupdf

      - name: Save issue body to a file
        if: steps.gate.outputs.skip != 'true'
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          # printf preserves every byte of the body verbatim.
          printf '%s' "$ISSUE_BODY" > /tmp/issue_body.md
          echo "Issue body saved ($(wc -c < /tmp/issue_body.md) bytes)."

      - name: Process issue and stage files
        if: steps.gate.outputs.skip != 'true'
        id: intake
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          python3 _automation/scripts/intake_from_issue.py \
            --body  /tmp/issue_body.md \
            --issue "${{ github.event.issue.number }}" \
            --token "$GITHUB_TOKEN" \
            --owner "${{ github.repository_owner }}" \
            --repo  "${{ github.event.repository.name }}" \
            --report-out  /tmp/intake_report.json \
            --pr-body-out /tmp/pr_body.md \
            --branch-out  /tmp/branch_name.txt
          BRANCH=$(cat /tmp/branch_name.txt)
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          SLUG=$(python3 -c "import json,sys; print(json.load(open('/tmp/intake_report.json'))['slug'])")
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"

      - name: Configure git
        if: steps.gate.outputs.skip != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create branch and commit
        if: steps.gate.outputs.skip != 'true'
        env:
          BRANCH: ${{ steps.intake.outputs.branch }}
          SLUG:   ${{ steps.intake.outputs.slug }}
        run: |
          set -euo pipefail
          git checkout -b "$BRANCH"
          git add -A
          if git diff --cached --quiet; then
            echo "::error::Nothing was staged after the intake script; aborting."
            exit 1
          fi
          git commit -m "$(cat <<EOF
          Auto-import publication from issue #${{ github.event.issue.number }}

          From the Upload a paper Issue Form. Front matter scaffolded by
          intake_publication.py; numbered figures rendered into
          _intake_figures/ as a one-click featured-image picker.

          Slug: $SLUG
          EOF
          )"
          # Force-push: the workflow exclusively owns intake/issue-* branches,
          # so on a rerun (e.g. after a permission/API failure further down) we
          # want the freshly-rebuilt commit to replace the previous attempt.
          git push --force-with-lease origin "$BRANCH"

      - name: Open the draft PR
        if: steps.gate.outputs.skip != 'true'
        id: pr
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/pr_body.md', 'utf8');
            const branch = '${{ steps.intake.outputs.branch }}';
            const slug   = '${{ steps.intake.outputs.slug }}';
            const issueNo = ${{ github.event.issue.number }};
            const pr = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              head:  branch,
              base:  'main',
              title: `Auto-import: ${slug}`,
              body,
              draft: true,
            });
            // Link the PR back to the issue so they're cross-referenced
            // in both directions and the issue closes when the PR merges.
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: issueNo,
              body: `Done — opened #${pr.data.number} from your upload. ` +
                    `Edit \`index.md\` in the PR's **Files changed** tab, or ` +
                    `comment \`/figure N\` to swap the featured image. ` +
                    `Merging the PR publishes the page.`,
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: issueNo,
              state: 'closed',
              labels: ['intake', 'intake-handled'],
            });
            core.setOutput('number', String(pr.data.number));
            core.setOutput('html_url', pr.data.html_url);

      - name: Surface PR link in the workflow run summary
        if: steps.gate.outputs.skip != 'true'
        run: |
          {
            echo "## Intake processed"
            echo ""
            echo "Issue: #${{ github.event.issue.number }}"
            echo "PR:    ${{ steps.pr.outputs.html_url }}"
            echo "Slug:  ${{ steps.intake.outputs.slug }}"
            echo "Branch: ${{ steps.intake.outputs.branch }}"
          } >> "$GITHUB_STEP_SUMMARY"
