name: Strip _intake_figures from main

# After an intake PR merges, the `_intake_figures/` directory it
# carried (used for the figure-picker thumbnails during PR review)
# becomes dead weight on `main`: a single paper can ship 5-15 large
# PNG thumbnails that nothing references after the maintainer has
# picked their featured image. This workflow removes them and pushes
# a cleanup commit.
#
# The Hugo build skips these files anyway (see `ignoreFiles` in
# hugo.yaml) so the published site is unaffected — this is just
# repository hygiene.

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  cleanup:
    # Don't loop on our own cleanup commit, and don't run on commits
    # whose only diff is the cleanup itself (defensive — the loop
    # guard above handles the common case).
    if: github.event.head_commit.author.username != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Find _intake_figures directories
        id: find
        run: |
          set -euo pipefail
          # _intake_figures/ subfolders are nested under whichever section
          # the intake bot wrote into (writings/content/<slug>/ or
          # talks/content/<slug>/ today). Search every section's content/
          # tree rather than a single top-level content/.
          mapfile -t dirs < <(find writings/content talks/content -type d -name "_intake_figures" 2>/dev/null | sort)
          if [ "${#dirs[@]}" -eq 0 ]; then
            echo "No _intake_figures directories present; nothing to clean."
            echo "any=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "any=true" >> "$GITHUB_OUTPUT"
          printf '%s\n' "${dirs[@]}" > /tmp/intake_dirs.txt
          echo "Will remove:"
          cat /tmp/intake_dirs.txt

      - name: Remove the directories
        if: steps.find.outputs.any == 'true'
        run: |
          set -euo pipefail
          while IFS= read -r d; do
            [ -z "$d" ] && continue
            rm -rf "$d"
          done < /tmp/intake_dirs.txt

      - name: Configure git
        if: steps.find.outputs.any == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit and push cleanup
        if: steps.find.outputs.any == 'true'
        run: |
          set -euo pipefail
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing staged after rm; skipping commit."
            exit 0
          fi
          git commit -m "$(cat <<'EOF'
          Strip _intake_figures/ leftovers from intake PRs

          The intake bots render every numbered figure into
          _intake_figures/ so reviewers can swap the featured image
          with `/figure N`. Once a PR merges those thumbnails are
          unused; Hugo ignores them via `ignoreFiles`, so this
          cleanup is purely repository hygiene.
          EOF
          )"
          git push origin main
