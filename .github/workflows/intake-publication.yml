name: Auto-import publication from PDF

# Triggered when a PDF lands in `intake/` as part of a pull request.
# Reads the PDF, fills out the front matter from Crossref, moves the PDF
# to `static/files/`, updates `data/writings_legacy_map.json`, and commits
# everything back into the same PR branch with a summary comment.
#
# Gary's workflow (no terminal needed):
#   1. On github.com, navigate into `intake/`.
#   2. "Add file -> Upload files", drag the PDF in.
#   3. Choose "Create a new branch for this commit and start a pull request".
#   4. "Propose changes" -> "Create pull request".
#   5. Wait ~1-2 minutes. The bot pushes a follow-up commit with the
#      auto-populated `index.md`/PDF move/legacy-map update, and posts
#      a summary comment listing anything that needs human review.
#   6. Edit any field directly in the PR's "Files changed" tab if needed.
#   7. Click "Merge pull request". The deploy workflow runs and the
#      paper goes live within ~3 minutes.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "intake/**/*.pdf"
      - "intake/**/*.PDF"

permissions:
  contents: write
  pull-requests: write

jobs:
  intake:
    # Skip our own follow-up pushes (otherwise this loops forever) and PRs
    # from forks (the GITHUB_TOKEN can't push back to a fork branch).
    if: >-
      github.actor != 'github-actions[bot]'
      && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install pyyaml certifi pymupdf

      - name: Find intake PDFs
        id: list_pdfs
        run: |
          set -euo pipefail
          mapfile -t pdfs < <(find intake -maxdepth 2 -type f \( -iname '*.pdf' \) 2>/dev/null | sort || true)
          if [ "${#pdfs[@]}" -eq 0 ]; then
            echo "No PDFs in intake/, nothing to do."
            echo "any=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "any=true" >> "$GITHUB_OUTPUT"
          printf '%s\n' "${pdfs[@]}" > /tmp/intake_pdfs.txt
          echo "Found PDFs:"
          cat /tmp/intake_pdfs.txt

      - name: Process each PDF
        if: steps.list_pdfs.outputs.any == 'true'
        run: |
          set -euo pipefail
          mkdir -p /tmp/intake_reports
          while IFS= read -r pdf; do
            [ -z "$pdf" ] && continue
            name=$(basename "$pdf" .pdf)
            echo "::group::Processing $pdf"
            python3 scripts/intake_publication.py "$pdf" \
              --report "/tmp/intake_reports/${name}.json"
            # After intake_publication.py moves the PDF to static/files/
            # and writes content/.../index.md, render every numbered
            # figure into _intake_figures/ so the maintainer can swap
            # the featured image with `/figure N`. Skip silently if
            # the report json wasn't produced (e.g. import error).
            if [ -s "/tmp/intake_reports/${name}.json" ]; then
              target_pdf=$(python3 -c "import json,sys; print(json.load(open('/tmp/intake_reports/${name}.json'))['target_pdf'])")
              target_md=$(python3 -c "import json,sys; print(json.load(open('/tmp/intake_reports/${name}.json'))['target_index_md'])")
              page_dir=$(dirname "$target_md")
              python3 scripts/extract_all_figures.py "$target_pdf" \
                --out "$page_dir/_intake_figures" || true
            fi
            echo "::endgroup::"
          done < /tmp/intake_pdfs.txt

      - name: Build PR comment summary
        if: steps.list_pdfs.outputs.any == 'true'
        env:
          BRANCH:    ${{ github.event.pull_request.head.ref }}
          OWNER:     ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          # Each report becomes a section rendered by build_intake_pr_body.py
          # so the legacy `intake/` flow shares the same abstract preview +
          # figure picker layout as the issue-form flow.
          : > /tmp/intake_summary.md
          echo "## Auto-import results" >> /tmp/intake_summary.md
          echo "" >> /tmp/intake_summary.md

          shopt -s nullglob
          reports=(/tmp/intake_reports/*.json)
          if [ "${#reports[@]}" -eq 0 ]; then
            echo "_No reports were generated._" >> /tmp/intake_summary.md
          fi
          for report in "${reports[@]}"; do
            [ -s "$report" ] || continue
            target_md=$(python3 -c "import json; print(json.load(open('$report'))['target_index_md'])")
            page_dir=$(dirname "$target_md")
            figures="$page_dir/_intake_figures/figures.json"
            figures_arg=""
            if [ -f "$figures" ]; then
              figures_arg="--figures $figures"
            fi
            python3 scripts/build_intake_pr_body.py \
              --report "$report" \
              $figures_arg \
              --owner  "$OWNER" \
              --repo   "$REPO_NAME" \
              --branch "$BRANCH" \
              --pr-number "$PR_NUMBER" \
              >> /tmp/intake_summary.md
            echo "" >> /tmp/intake_summary.md
            echo "---" >> /tmp/intake_summary.md
            echo "" >> /tmp/intake_summary.md
          done
          echo "Summary built ($(wc -c < /tmp/intake_summary.md) bytes):"
          head -40 /tmp/intake_summary.md

      - name: Configure git
        if: steps.list_pdfs.outputs.any == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit and push generated files
        if: steps.list_pdfs.outputs.any == 'true'
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit (script ran but produced no diff)."
            exit 0
          fi
          git commit -m "$(cat <<'EOF'
          Auto-import publication metadata from intake PDF(s)

          Generated by .github/workflows/intake-publication.yml.
          Review the front matter in the PR diff and edit any field as needed.
          Merging this PR publishes the paper(s).
          EOF
          )"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

      - name: Comment on PR with summary
        if: steps.list_pdfs.outputs.any == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            let body;
            try {
              body = fs.readFileSync('/tmp/intake_summary.md', 'utf8');
            } catch (e) {
              core.warning('Could not read intake summary: ' + e.message);
              body = '## Auto-import results\n\n_(no summary captured - check the workflow logs)_';
            }
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body,
            });
