name: Weekly External Link Check

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9am UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Check external links
        id: check
        run: |
          python3 << 'PYEOF'
          import os, re, json, sys, time
          import requests
          from concurrent.futures import ThreadPoolExecutor, as_completed

          CONTENT_DIRS = ["content/publication", "content/talk", "content/software",
                          "content/bio", "content/teaching", "content/research-areas",
                          "content/dataverse", "content/research-group"]

          def extract_urls(filepath):
              with open(filepath) as f:
                  text = f.read()
              urls = set()
              for m in re.finditer(r'https?://[^\s\)\]"\'<>]+', text):
                  url = m.group(0).rstrip('.,;:')
                  urls.add(url)
              return urls

          def check_url(url):
              try:
                  resp = requests.head(url, timeout=15, allow_redirects=True,
                                       headers={"User-Agent": "Mozilla/5.0 GKingSiteLinkChecker"})
                  if resp.status_code == 405:
                      resp = requests.get(url, timeout=15, allow_redirects=True,
                                          headers={"User-Agent": "Mozilla/5.0 GKingSiteLinkChecker"},
                                          stream=True)
                  return url, resp.status_code, None
              except requests.exceptions.Timeout:
                  return url, None, "timeout"
              except requests.exceptions.ConnectionError:
                  return url, None, "connection_error"
              except Exception as e:
                  return url, None, str(e)[:80]

          all_urls = {}
          for d in CONTENT_DIRS:
              if not os.path.isdir(d):
                  continue
              for root, dirs, files in os.walk(d):
                  for f in files:
                      if f.endswith('.md'):
                          fp = os.path.join(root, f)
                          for url in extract_urls(fp):
                              if url not in all_urls:
                                  all_urls[url] = []
                              all_urls[url].append(fp)

          print(f"Found {len(all_urls)} unique external URLs to check")

          broken = []
          checked = 0
          with ThreadPoolExecutor(max_workers=5) as pool:
              futures = {pool.submit(check_url, url): url for url in all_urls}
              for future in as_completed(futures):
                  url, status, error = future.result()
                  checked += 1
                  if checked % 100 == 0:
                      print(f"  Checked {checked}/{len(all_urls)}...")
                  if error or (status and status >= 400):
                      broken.append({
                          "url": url,
                          "status": status,
                          "error": error,
                          "files": all_urls[url][:3],
                      })

          print(f"\nResults: {checked} checked, {len(broken)} broken")

          report_path = "link-check-report.json"
          with open(report_path, "w") as f:
              json.dump({"total": checked, "broken_count": len(broken), "broken": broken}, f, indent=2)

          if broken:
              md = f"# Link Check Report\n\n**{len(broken)} broken links found** out of {checked} checked.\n\n"
              for b in sorted(broken, key=lambda x: x["url"]):
                  status = b["status"] or b["error"]
                  md += f"- **{status}**: `{b['url']}`\n"
                  for fp in b["files"]:
                      md += f"  - {fp}\n"
              with open("link-check-report.md", "w") as f:
                  f.write(md)
              print("\n" + md[:2000])

          with open(os.environ.get("GITHUB_OUTPUT", "/dev/null"), "a") as f:
              f.write(f"broken_count={len(broken)}\n")

          PYEOF

      - name: Create issue if broken links found
        if: steps.check.outputs.broken_count > 0
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('link-check-report.md', 'utf8');
            const title = `[Automated] ${new Date().toISOString().slice(0,10)}: Broken external links detected`;

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'link-check',
              per_page: 1,
            });

            if (issues.data.length > 0) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues.data[0].number,
                body: report,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: report,
                labels: ['link-check'],
              });
            }

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: link-check-report
          path: link-check-report.*
