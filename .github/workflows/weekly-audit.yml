name: Weekly Site Audit

on:
  schedule:
    - cron: '0 14 * * 1'  # Every Monday at 10am ET (14:00 UTC)
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml requests

      - name: Run audit
        id: audit
        run: |
          python3 _automation/scripts/audit_site.py audit-report.md || true
          echo "report<<REPORT_EOF" >> "$GITHUB_OUTPUT"
          cat audit-report.md >> "$GITHUB_OUTPUT"
          echo "REPORT_EOF" >> "$GITHUB_OUTPUT"

      - name: Check dependency versions (requires network)
        id: versions
        run: |
          python3 << 'PYEOF'
          import json, re, urllib.request, sys, os

          results = []

          # Current Hugo version from deploy.yml
          with open(".github/workflows/deploy.yml") as f:
              m = re.search(r'HUGO_VERSION:\s*(\S+)', f.read())
              current_hugo = m.group(1) if m else "unknown"

          # Latest Hugo release
          try:
              req = urllib.request.Request(
                  "https://api.github.com/repos/gohugoio/hugo/releases/latest",
                  headers={"User-Agent": "gking-site-audit"}
              )
              resp = urllib.request.urlopen(req, timeout=10)
              data = json.loads(resp.read())
              latest_hugo = data["tag_name"].lstrip("v")
              if current_hugo != latest_hugo:
                  results.append(f"- **Hugo:** using {current_hugo}, latest is **{latest_hugo}** → https://github.com/gohugoio/hugo/releases")
              else:
                  results.append(f"- Hugo: {current_hugo} (up to date)")
          except Exception as e:
              results.append(f"- Hugo: {current_hugo} (could not check latest: {e})")

          # Hugo Blox version from go.mod
          with open("go.mod") as f:
              m = re.search(r'blox-tailwind\s+v([\d.]+)', f.read())
              current_blox = m.group(1) if m else "unknown"
          results.append(f"- Hugo Blox (blox-tailwind): {current_blox}")

          # Pagefind from package.json
          with open("package.json") as f:
              pkg = json.loads(f.read())
          deps = {**pkg.get("dependencies", {}), **pkg.get("devDependencies", {})}
          current_pf = deps.get("pagefind", "not installed")
          try:
              req = urllib.request.Request(
                  "https://registry.npmjs.org/pagefind/latest",
                  headers={"User-Agent": "gking-site-audit"}
              )
              resp = urllib.request.urlopen(req, timeout=10)
              data = json.loads(resp.read())
              latest_pf = data["version"]
              results.append(f"- Pagefind: using {current_pf}, latest is **{latest_pf}**")
          except Exception:
              results.append(f"- Pagefind: {current_pf}")

          report = "\n## Dependency Versions\n\n" + "\n".join(results) + "\n"
          print(report)

          with open("versions-report.md", "w") as f:
              f.write(report)

          PYEOF

      - name: Combine reports
        run: |
          cat audit-report.md versions-report.md > full-report.md

      - name: Post audit report as GitHub issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let report = '';
            try {
              report = fs.readFileSync('full-report.md', 'utf8');
            } catch {
              report = fs.readFileSync('audit-report.md', 'utf8');
            }
            const today = new Date().toISOString().slice(0, 10);
            const title = `[Audit] ${today}: Weekly site audit report`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `_Run: ${runUrl}_\n\n${report}`;

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'audit',
              per_page: 1,
            });

            if (existing.data.length > 0) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                title: title,
                body: body,
              });
              core.notice(`Updated existing audit issue #${existing.data[0].number}`);
            } else {
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['audit'],
              });
              core.notice(`Created new audit issue #${created.data.number}`);
            }

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-report
          path: |
            audit-report.md
            versions-report.md
            full-report.md
