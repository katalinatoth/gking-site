name: Upload a paper
description: Upload a PDF and the bot will scaffold a publication page in a draft PR.
body:
  - type: dropdown
    id: kind
    attributes:
      label: Type
      options:
        - Article
        - Book
        - Patent
        - Software
        - Talk
    validations:
      required: true

  - type: textarea
    id: pdf
    attributes:
      label: Main PDF
      description: Drag the paper PDF into this box.
    validations:
      required: true

  - type: input
    id: short_url
    attributes:
      label: Short URL
      description: Optional vanity path. Type just the name with no slashes.
      placeholder: instability

  - type: textarea
    id: supplementary
    attributes:
      label: Supplementary materials
      description: Optional. Drag in extra PDFs.

  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Optional. Anything you want the bot or a future-you to know.
