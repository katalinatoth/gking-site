name: Upload a paper
description: Upload a PDF and the bot will scaffold a publication page in a draft PR.
labels: ["intake"]
body:
  - type: dropdown
    id: kind
    attributes:
      label: Type
      options:
        - Article
        - Book
        - Patent
        - Software
        - Talk
    validations:
      required: true

  - type: textarea
    id: pdf
    attributes:
      label: Main PDF
      description: Drag the paper PDF into this box.
    validations:
      required: true

  - type: input
    id: short_url
    attributes:
      label: Short URL
      description: Optional vanity path. Type just the name with no slashes.
      placeholder: instability

  - type: textarea
    id: supplementary
    attributes:
      label: Supplementary materials
      description: Optional. Drag in extra PDFs.

  - type: textarea
    id: notes
    attributes:
      label: Notes for reviewers
      description: Optional. Copied verbatim into the draft PR description for humans to read. The bot does not parse or act on this text, so do not put corrections here. To fix the title, abstract, figure, etc., post a slash command (like /title or /figure 3) as a comment on the PR after it opens.
      placeholder: e.g. supersedes the working paper at /wp-instability/, or @gking please review the citation
