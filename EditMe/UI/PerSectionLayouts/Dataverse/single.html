{{ define "main" }}

<div style="max-width:1200px;margin:0 auto;padding:3rem 5rem;">
  <h1 class="text-4xl font-bold tracking-tight text-slate-900 dark:text-slate-100 mb-4">{{ .Title }}</h1>

  <div class="prose prose-slate lg:prose-lg dark:prose-invert max-w-none mb-6">
    {{ .Content }}
  </div>

  <script id="dataverse-widget-js"
    src="https://dataverse.harvard.edu/resources/js/widgets.js?alias=king&dvUrl=https://dataverse.harvard.edu&widgetScope=king&widget=iframe&heightPx=800">
  </script>
  <noscript>
    <p><a href="https://dataverse.harvard.edu/dataverse/king">View Gary King's Dataverse collection</a></p>
  </noscript>
</div>

{{ end }}
