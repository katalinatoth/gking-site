# "Current Working Papers" slugs for the Journal Articles tab of the writings page.
#
# Each item is rendered above the rest of the Journal Articles list with a
# "Current Working Papers" heading and a blue-framed card. This pulls the most
# representative current work toward the top (serial-position primacy) and
# makes it perceptually distinct (Von Restorff isolation).
#
# Format:
#   journal:
#     - "<slug>"        # directory name under content/publication/
#
# Only the `journal` tab populates this list. All other tabs (book,
# presentation, software, patent, other) intentionally have empty lists so
# the strip is suppressed on their pages.
#
# Keep the list short (<= 5) so the highlight effect isn't diluted.

journal:
  - "inducing-sustained-creativity-and-diversity-in-large-language-models"
  - "assessing-differences-in-country-level-estimates-of-maternal-mortality-a-compari"
  - "survey-estimates-of-wartime-mortality"

book: []

presentation: []

software: []

patent: []

other: []
